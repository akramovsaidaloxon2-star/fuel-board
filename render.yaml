services:
  - type: web
    name: fuel-board
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: MOTIVE_API_KEY
        sync: false
      - key: AUTH_USER
        sync: false
      - key: AUTH_PASS
        sync: false
      - key: ORS_KEY
        sync: false
